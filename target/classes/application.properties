# ==================== LOGGING CONFIGURATION ====================
# Configuraci�n b�sica de logging
logging.file.name=logs/application.log
logging.file.path=./logs

# Niveles de logging - CORREGIDO para tu paquete
logging.level.pe.edu.upc.avi_aplicaction=DEBUG
logging.level.pe.edu.upc.avi_aplicaction.controllers=DEBUG
